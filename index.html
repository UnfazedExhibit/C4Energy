document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n<\u002Fstyle>\n\n<style>\n*{margin:0;padding:0;box-sizing:border-box;}\n:root{\n  /* C4 ENERGY brand world */\n  --c4-black:#0A0A0A;\n  --c4-ink:#141414;\n  --c4-ink2:#1A1A1A;\n  --c4-green:#C3F53C;\n  --c4-green-dk:#9BD41F;\n  --c4-red:#E81E2C;\n  --c4-red-dk:#B5121E;\n  --c4-white:#FFFFFF;\n  --bg:#F1F1ED;\n  --bg2:#E6E6DF;\n  --ink:#141414;\n  --muted:#6E6E68;\n  --muted2:#9A9A92;\n  --rule:#1A1A1A;\n}\nhtml{scroll-behavior:smooth;}\nbody{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;}\nhtml,body{overflow-x:hidden;max-width:100%;}\nimg{max-width:100%;height:auto;}\nh1,h2,h3,h4{overflow-wrap:break-word;}\n\n/* ====== TYPOGRAPHY ====== */\n.mono{font-family:'JetBrains Mono',monospace;}\n.display{font-family:'Anton','Bebas Neue',sans-serif;letter-spacing:.5px;line-height:.92;}\n.label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);font-weight:500;}\n\n/* ====== LAYOUT ====== */\n.wrap{max-width:1240px;margin:0 auto;padding:0 56px;}\nhr.heavy{border:none;height:2px;background:var(--ink);margin:0;}\nhr.thin{border:none;height:1px;background:rgba(0,0,0,.18);margin:0;}\n\n/* ====== TOP BAR ====== */\n.topbar{position:sticky;top:0;z-index:100;background:var(--c4-black);color:#fff;padding:14px 56px;display:flex;justify-content:space-between;align-items:center;gap:24px;border-bottom:3px solid var(--c4-green);}\n.topbar-left{display:flex;align-items:center;gap:32px;}\n.tb-mark{font-family:'Anton','Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;display:flex;align-items:center;gap:14px;color:#fff;}\n.tb-mark .x{color:var(--c4-green);margin:0 4px;}\n.tb-mark .c4-mark{height:30px;width:auto;display:block;background:#fff;padding:4px 8px;}\n.tb-doc{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);}\n.tb-doc::before{content:'◆ ';color:var(--c4-green);}\n.tb-cta{background:var(--c4-green);color:var(--c4-black);padding:10px 20px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;font-weight:700;transition:background .15s;}\n.tb-cta:hover{background:var(--c4-red);color:#fff;}\n\n/* ====== COVER ====== */\n.cover{padding:0;background:var(--c4-black);color:#fff;position:relative;overflow:hidden;border-bottom:4px solid var(--c4-green);}\n.cover-header{padding-top:56px;position:relative;z-index:2;}\n.cover-inner{padding:56px 0 96px;position:relative;z-index:2;}\n.cover-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.18);}\n.cm-key{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;}\n.cm-val{font-size:13px;font-weight:500;color:#fff;}\n\n.cover-title{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(72px,10.5vw,160px);line-height:1.0;letter-spacing:1px;margin-bottom:28px;}\n.cover-title .l1{display:block;color:#fff;}\n.cover-title .l2{display:block;color:var(--c4-green);}\n.cover-title .l3{display:block;color:transparent;-webkit-text-stroke:1.5px #fff;}\n\n.cover-headliner{display:inline-flex;align-items:stretch;gap:0;margin-bottom:40px;border:3px solid var(--c4-green);background:var(--c4-black);box-shadow:8px 8px 0 var(--c4-red);}\n.cover-headliner .chl-flag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2.5px;font-weight:700;color:var(--c4-black);background:var(--c4-green);padding:0 16px;display:flex;align-items:center;writing-mode:vertical-rl;transform:rotate(180deg);}\n.cover-headliner .chl-name{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(40px,5.4vw,80px);line-height:.9;letter-spacing:2px;color:#fff;padding:14px 26px 12px;display:flex;align-items:center;}\n.cover-headliner .chl-date{display:flex;flex-direction:column;justify-content:center;background:var(--c4-red);color:#fff;padding:12px 26px;border-left:3px solid var(--c4-green);}\n.cover-headliner .chl-date .d{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(34px,4.4vw,64px);line-height:.9;letter-spacing:1px;color:var(--c4-green);}\n.cover-headliner .chl-date .sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#fff;margin-top:6px;}\n\n\n.cover-sub{display:grid;grid-template-columns:1.4fr 1fr;gap:60px;align-items:end;}\n.cover-thesis{font-size:22px;line-height:1.45;font-weight:400;color:#fff;max-width:640px;text-wrap:pretty;}\n.cover-thesis em{font-style:normal;background:var(--c4-green);color:var(--c4-black);padding:1px 8px;font-weight:700;}\n.cover-thesis strong{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--c4-green);font-weight:700;}\n.cover-byline{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);line-height:1.7;}\n.cover-byline strong{color:#fff;font-weight:500;}\n\n.cover-logo-row{display:flex;align-items:center;gap:24px;margin-bottom:36px;flex-wrap:wrap;}\n.cover-logo-row .pipe{width:1px;height:78px;background:rgba(255,255,255,.3);}\n.cover-logo-row .legend{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);line-height:1.6;}\n.cover-logo-row .legend strong{color:var(--c4-green);font-weight:600;display:block;font-size:11px;margin-bottom:4px;letter-spacing:2.5px;}\n.cover-logo{height:110px;width:auto;display:block;background:#fff;padding:14px 22px;border:3px solid #fff;}\n\n/* explosion blast motif */\n.cover-blast{position:absolute;top:-100px;right:-200px;width:900px;height:900px;opacity:.18;pointer-events:none;z-index:1;}\n.cover-blast svg{width:100%;height:100%;}\n.cover-stamp{position:absolute;top:40px;right:56px;width:140px;height:140px;background:var(--c4-green);color:var(--c4-black);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Anton',sans-serif;line-height:.9;font-size:17px;letter-spacing:1px;text-align:center;transform:rotate(-12deg);border:3px solid var(--c4-black);z-index:3;box-shadow:6px 6px 0 var(--c4-black);}\n.cover-stamp .big{font-size:24px;line-height:.9;color:var(--c4-red);}\n.cover-stamp .small{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--c4-black);margin-top:6px;font-weight:700;}\n\n/* ====== CONFIRMED PARTNERS ====== */\n@keyframes cpPulse{0%,100%{box-shadow:0 0 0 0 rgba(195,245,60,.55);}50%{box-shadow:0 0 0 8px rgba(195,245,60,0);}}\n.cp-banner{display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center;background:var(--c4-green);color:var(--c4-black);border:3px solid #fff;padding:30px 36px;margin-bottom:8px;}\n.cp-banner-flag{font-family:'Anton','Bebas Neue',sans-serif;font-size:22px;line-height:1;letter-spacing:1px;color:#fff;background:var(--c4-red);border:3px solid var(--c4-black);padding:18px 16px;writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;align-self:stretch;display:flex;align-items:center;justify-content:center;}\n.cp-banner-h{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(26px,3vw,40px);line-height:1.04;letter-spacing:.5px;margin-bottom:12px;}\n.cp-banner-h .g{color:var(--c4-red);background:var(--c4-black);padding:0 8px;}\n.cp-banner-text p{font-size:15px;line-height:1.55;color:var(--c4-black);font-weight:400;max-width:820px;}\n.cp-banner-text p strong{background:var(--c4-black);color:var(--c4-green);padding:0 5px;font-weight:700;}\n.cp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px;}\n.cp-card{position:relative;background:linear-gradient(160deg,#1c1c1c 0%,#0d0d0d 100%);border:2px solid var(--c4-green);padding:30px 26px 28px;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease;}\n.cp-card::after{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(195,245,60,.18) 0%,transparent 70%);pointer-events:none;}\n.cp-card:hover{transform:translateY(-6px);box-shadow:0 18px 0 -6px var(--c4-red),0 22px 40px rgba(0,0,0,.5);}\n.cp-stamp{position:absolute;top:0;right:0;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;font-weight:700;color:var(--c4-black);background:var(--c4-green);padding:7px 14px 7px 16px;clip-path:polygon(14px 0,100% 0,100% 100%,0 100%);animation:cpPulse 2.4s ease-in-out infinite;}\n.cp-brand{font-family:'Anton','Bebas Neue',sans-serif;font-size:46px;line-height:.86;letter-spacing:1px;color:#fff;margin:14px 0 18px;text-transform:uppercase;}\n.cp-hook{display:inline-block;font-family:'Anton','Bebas Neue',sans-serif;font-size:42px;line-height:.82;letter-spacing:.5px;color:var(--c4-black);background:var(--c4-green);padding:10px 14px;margin-bottom:16px;transform:rotate(-2deg);box-shadow:5px 5px 0 var(--c4-red);}\n.cp-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c4-green);font-weight:700;margin-bottom:12px;}\n.cp-desc{font-size:13px;line-height:1.6;color:rgba(255,255,255,.82);font-weight:300;}\n.cp-desc strong{color:#fff;font-weight:600;}\n\n\n/* ====== SECTION CHROME ====== */\nsection{padding:96px 0;border-bottom:1px solid rgba(0,0,0,.12);}\nsection.dark{background:var(--c4-black);color:#fff;border-bottom:none;}\nsection.dark .label{color:rgba(255,255,255,.5);}\nsection.dark hr.thin{background:rgba(255,255,255,.18);}\n.sec-hd{display:grid;grid-template-columns:120px 1fr 200px;gap:32px;align-items:start;margin-bottom:56px;padding-bottom:24px;border-bottom:2px solid var(--c4-black);}\nsection.dark .sec-hd{border-bottom-color:rgba(255,255,255,.25);}\n.sec-num{font-family:'Anton','Bebas Neue',sans-serif;font-size:64px;line-height:.85;color:var(--c4-red);}\nsection.dark .sec-num{color:var(--c4-green);}\n.sec-title{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(44px,5vw,72px);line-height:1.05;letter-spacing:1px;}\n.sec-title span[style*=\"background\"]{display:inline-block;line-height:1.05;}\n.sec-meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.7;}\nsection.dark .sec-meta{color:rgba(255,255,255,.5);}\n\n/* ====== EXEC SUMMARY ====== */\n.exec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}\n.exec-cell{padding:32px 28px 32px 0;border-right:1px solid rgba(0,0,0,.18);}\n.exec-cell:last-child{border-right:none;padding-right:0;}\n.exec-cell:not(:first-child){padding-left:28px;}\n.exec-num{font-family:'Anton','Bebas Neue',sans-serif;font-size:96px;line-height:.85;color:var(--c4-black);margin-bottom:10px;letter-spacing:-1px;background:var(--c4-green);display:inline-block;padding:0 12px;}\n.exec-num .unit{font-size:38px;color:var(--c4-red);}\n.exec-cap{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px;margin-top:12px;}\n.exec-body{font-size:13px;color:var(--muted);line-height:1.65;font-weight:400;}\n.exec-body strong{color:var(--ink);font-weight:600;}\n\n/* ====== THESIS ====== */\n.thesis-line{display:grid;grid-template-columns:120px 1fr;gap:32px;padding:24px 0;border-bottom:1px solid rgba(255,255,255,.12);}\n.thesis-line:last-child{border-bottom:none;}\n.thesis-tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:600;padding-top:6px;}\n.thesis-body{font-size:21px;line-height:1.4;color:#fff;font-weight:400;text-wrap:pretty;}\n.thesis-body strong{font-weight:600;background:linear-gradient(transparent 65%,rgba(195,245,60,.45) 65%);color:#fff;}\n\n/* ====== ALIGNMENT TABLE ====== */\n.align-table{display:grid;grid-template-columns:1.2fr 1.2fr 1fr;gap:0;border:2px solid var(--c4-black);}\n.at-head{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c4-green);background:var(--c4-black);padding:14px 20px;font-weight:600;}\n.at-cell{padding:24px 20px;border-top:1px solid rgba(0,0,0,.12);border-right:1px solid rgba(0,0,0,.12);font-size:14px;line-height:1.55;background:#fff;}\n.at-cell:nth-child(3n){border-right:none;}\n.at-cell.jd{font-weight:500;color:var(--ink);}\n.at-cell.uf{color:var(--ink);font-weight:400;}\n.at-cell.fit{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--c4-black);background:var(--c4-green);font-weight:700;text-transform:uppercase;text-align:center;}\n\n/* ====== ENERGY CITY SECTION ====== */\n.energycity{background:var(--c4-black);color:#fff;border-bottom:none;}\n.energy-hero{position:relative;background:var(--c4-black);color:#fff;padding:80px 56px 96px;margin:0 -56px 56px;overflow:hidden;border:3px solid var(--c4-green);}\n.energy-hero::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(195,245,60,.06) 0 14px,transparent 14px 28px);pointer-events:none;}\n.energy-hero h3{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(64px,9vw,150px);line-height:1.0;letter-spacing:1px;margin-bottom:24px;position:relative;}\n.energy-hero h3 .g{color:var(--c4-green);}\n.energy-hero h3 .r{color:var(--c4-red);}\n.energy-hero p{font-size:18px;line-height:1.6;color:rgba(255,255,255,.95);max-width:780px;position:relative;}\n.energy-hero p strong{background:var(--c4-green);color:var(--c4-black);padding:0 6px;font-weight:700;}\n.energy-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#fff;color:var(--ink);border:2px solid #fff;margin-top:32px;}\n.estat{padding:24px 22px;border-right:1px solid rgba(0,0,0,.18);}\n.estat:last-child{border-right:none;}\n.estat .n{font-family:'Anton','Bebas Neue',sans-serif;font-size:54px;line-height:.85;letter-spacing:-1px;color:var(--c4-red);}\n.estat .k{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:10px;}\n.estat .d{font-size:12px;line-height:1.55;color:var(--ink);margin-top:10px;font-weight:400;}\n\n.competitor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:32px;}\n.comp-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);padding:22px 22px;}\n.comp-card .name{font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;color:#fff;}\n.comp-card .hq{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--c4-green);margin-top:6px;text-transform:uppercase;}\n.comp-card .note{font-size:12px;color:rgba(255,255,255,.7);margin-top:14px;line-height:1.5;}\n\n.energy-callout{margin-top:48px;padding:48px 44px;background:var(--c4-green);color:var(--c4-black);border:3px solid #fff;display:grid;grid-template-columns:1fr 2fr;gap:48px;align-items:center;}\n.energy-callout .big{font-family:'Anton','Bebas Neue',sans-serif;font-size:96px;line-height:.85;color:var(--c4-red);}\n.energy-callout h4{font-family:'Anton','Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1.15;margin-bottom:14px;color:var(--c4-black);}\n.energy-callout p{font-size:16px;line-height:1.6;color:var(--c4-black);}\n.energy-callout p strong{background:var(--c4-black);color:var(--c4-green);padding:1px 6px;}\n\n/* ====== ATLANTA RETAIL MAP ====== */\n.launch-band{background:var(--c4-red);color:#fff;padding:64px 0;border-top:4px solid var(--c4-green);border-bottom:4px solid var(--c4-black);}\n.launch-title{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(56px,8vw,130px);line-height:1.0;margin-bottom:24px;letter-spacing:1px;}\n.launch-title .g{color:var(--c4-green);}\n.launch-sub{font-size:18px;line-height:1.6;max-width:780px;color:rgba(255,255,255,.95);margin-bottom:32px;}\n\n.loc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:48px;background:#fff;color:var(--ink);border:3px solid var(--c4-black);}\n.lo ackground:none;padding:0;display:block;}\n.dual-card .foot{padding:20px 28px;background:var(--c4-black);color:#fff;}\n.dual-card .foot .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:600;margin-bottom:6px;}\n.dual-card .foot p{font-size:13px;line-height:1.55;color:rgba(255,255,255,.9);}\n\n.head-runway{margin-top:48px;padding:36px 40px;background:var(--c4-green);color:var(--c4-black);display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center;border:3px solid #fff;}\n.head-runway .icon{font-family:'Anton',sans-serif;font-size:120px;line-height:.85;color:var(--c4-red);letter-spacing:-2px;}\n.head-runway h4{font-family:'Anton','Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1.05;margin-bottom:12px;color:var(--c4-black);}\n.head-runway p{font-size:15px;line-height:1.6;color:var(--c4-black);}\n.head-runway p strong{background:var(--c4-black);color:var(--c4-green);padding:1px 6px;}\n\n.influence-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:2px solid rgba(255,255,255,.2);margin-bottom:48px;margin-top:48px;}\n.infl{padding:32px 28px;border-right:1px solid rgba(255,255,255,.15);}\n.infl:last-child{border-right:none;}\n.infl .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:600;margin-bottom:14px;}\n.infl .t{font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;margin-bottom:12px;color:#fff;}\n.infl .d{font-size:13px;line-height:1.6;color:rgba(255,255,255,.78);font-weight:300;}\n.infl .d strong{color:#fff;font-weight:600;}\n\n/* ====== AUDIENCE OVERLAY ====== */\n.aud-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}\n.aud-card{background:rgba(255,255,255,.06);padding:36px 32px;border-left:3px solid var(--c4-green);}\n.aud-title{font-family:'Anton','Bebas Neue',sans-serif;font-size:3 -green);font-weight:700;}\n.pb-mech li strong{color:var(--c4-green);font-weight:700;}\n\n/* ====== C4 EXPLOSION CHAMBER RENDER ====== */\n.chamber-stage{position:relative;background:#050505;min-height:580px;overflow:hidden;border:2px solid rgba(255,255,255,.18);}\n.chamber-bg{position:absolute;inset:0;background:\n  radial-gradient(ellipse at 50% 35%,rgba(195,245,60,.28) 0%,rgba(195,245,60,0) 50%),\n  radial-gradient(ellipse at 50% 70%,rgba(232,30,44,.30) 0%,rgba(232,30,44,0) 55%),\n  linear-gradient(180deg,#0a0a0a 0%,#000 100%);}\n.chamber-road{position:absolute;bottom:0;left:0;right:0;height:55%;}\n.chamber-road::before{content:'';position:absolute;inset:0;background-image:\n  linear-gradient(rgba(195,245,60,.15) 1px,transparent 1px),\n  linear-gradient(90deg,rgba(195,245,60,.15) 1px,transparent 1px);\n  background-size:80px 80px;\n  transform:perspective(900px) rotateX(62deg);\n  transform-origin:center bottom;\n  opacity:.5;\n}\n.chamber-venue{position:absolute;top:6%;left:50%;transform:translateX(-50%);width:46%;height:30%;background:linear-gradient(180deg,#1a1a1a 0%,#0a0a0a 100%);border:2px solid rgba(195,245,60,.55);box-shadow:inset 0 0 60px rgba(195,245,60,.1),0 40px 80px rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;}\n.chamber-venue::before{content:'';position:absolute;top:0;left:0;right:0;height:8px;background:var(--c4-green);}\n.chamber-venue::after{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:60%;height:6px;background:repeating-linear-gradient(90deg,var(--c4-red) 0 18px,transparent 18px 24px);opacity:.8;}\n.chamber-venue .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.55);margin-bottom:8px;}\n.chamber-venue .h1{font-family:'Anton','Bebas Neue',sans-serif;font-size:34px;letter-spacing:1.5px;color:#fff;line-height:.95;text-align:center;}\n.chamber-venue .h1 .g{color:var(--c4-green);}\n.chamber-venue .marquee{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--c4-green);margin-top:8px;}\n\n/* the chamber itself */\n.chamber-box{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:60%;max-width:680px;aspect-ratio:2.2/1;z-index:5;filter:drop-shadow(0 30px 50px rgba(0,0,0,.8)) drop-shadow(0 0 60px rgba(195,245,60,.35));}\n.chamber-box svg{width:100%;height:100%;display:block;}\n\n.chamber-queue{position:absolute;bottom:14%;left:4%;width:160px;height:80px;z-index:3;display:flex;align-items:flex-end;gap:4px;}\n.chamber-queue .p{width:18px;background:linear-gradient(180deg,rgba(195,245,60,.7) 0%,rgba(195,245,60,.15) 100%);height:48px;border:1px solid rgba(255,255,255,.2);position:relative;}\n.chamber-queue .p::before{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#FFD9B5;border-radius:50%;border:1px solid rgba(255,255,255,.4);}\n.chamber-queue .p:nth-child(2){height:52px;}\n.chamber-queue .p:nth-child(3){height:46px;}\n.chamber-queue .p:nth-child(4){height:50px;}\n.chamber-queue .p:nth-child(5){height:48px;}\n.chamber-queue .lbl{position:absolute;top:-22px;left:0;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--c4-green);white-space:nowrap;}\n\n.chamber-rep{position:absolute;bottom:14%;right:6%;width:60px;height:90px;z-index:4;display:flex;flex-direction:column;align-items:center;}\n.chamber-rep .head{width:18px;height:18px;background:#FFD9B5;border-radius:50%;border:1px solid #000;}\n.chamber-rep .body{width:36px;height:48px;background:var(--c4-black);margin-top:4px;border:1px solid var(--c4-green);position:relative;}\n.chamber-rep .body::after{content:'C4';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Anton',sans-serif;font-size:11px;color:var(--c4-green);font-weight:700;letter-spacing:.5px;}\n.chamber-rep .can{position:absolute;top:34px;right:-8px;width:9px;height:18px;background:linear-gradient(1 black);border-bottom:2px solid var(--c4-black);background:#fff;display:flex;flex-direction:column;gap:14px;}\n.deliv-num{font-family:'Anton','Bebas Neue',sans-serif;font-size:60px;line-height:.85;color:var(--c4-black);background:var(--c4-green);align-self:flex-start;padding:2px 14px 0;}\n.deliv-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}\n.deliv-title{font-family:'Anton','Bebas Neue',sans-serif;font-size:28px;line-height:1.05;letter-spacing:.5px;}\n.deliv-desc{font-size:14px;color:var(--ink);line-height:1.6;font-weight:300;}\n.deliv-desc strong{font-weight:600;}\n.deliv-mech{margin-top:auto;padding-top:18px;border-top:1px solid rgba(0,0,0,.12);}\n.deliv-mech-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}\n.deliv-mech ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;}\n.deliv-mech li{font-size:12px;color:var(--ink);padding-left:16px;position:relative;line-height:1.5;}\n.deliv-mech li::before{content:'▸';position:absolute;left:0;color:var(--c4-red);font-weight:700;}\n\n.channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:48px;}\n.email-mock{background:#fff;border:2px solid var(--c4-black);overflow:hidden;display:flex;flex-direction:column;}\n.email-bar{background:#F2F2F0;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,0,0,.12);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);}\n.email-meta{padding:18px 24px 12px;border-bottom:1px solid rgba(0,0,0,.1);}\n.email-meta .from{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;}\n.email-meta .subj{font-size:14px;color:var(--ink);}\n.email-body{padding:24px;flex:1;display:flex;flex-direction:column;gap:14px;}\n.email-hero{background:var(--c4-black);color:#fff;padding:20px 18px;text-align:center;}\n.email-hero .h1{font-family:'Anton','Bebas Neue',sans-serif;font-size:32px;line-height:.95;letter-spacing:1px;}\n.email-hero .h1 .g{color:var(--c4-green);}\n.email-hero .h2{font-size:11px;color:rgba(255,255,255,.7);margin-top:4px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase;}\n.email-section{display:grid;grid-template-columns:100px 1fr;gap:14px;padding:14px;background:#F8FBE9;border-left:3px solid var(--c4-green);}\n.email-section .ic{background:#fff;width:88px;height:auto;display:flex;align-items:center;justify-content:center;padding:8px;border:1px solid rgba(0,0,0,.1);}\n.email-section .ic img{width:100%;height:auto;display:block;}\n.email-section .t1{font-family:'Anton','Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;line-height:1;margin-bottom:4px;color:var(--c4-black);}\n.email-section .t2{font-size:11px;color:var(--muted);line-height:1.5;}\n.email-section .cta{margin-top:8px;display:inline-block;background:var(--c4-green);color:var(--c4-black);padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;text-decoration:none;}\n.email-foot{padding:10px 18px;background:#F2F2F0;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-align:center;}\n\n.sms-phone{background:#0A0A0A;border:8px solid #1A1A1A;border-radius:38px;padding:24px 14px 14px;width:100%;max-width:320px;margin:0 auto;box-shadow:0 30px 60px rgba(0,0,0,.4);position:relative;}\n.sms-phone::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:84px;height:18px;background:#000;border-radius:14px;}\n.sms-screen{background:#000;border-radius:24px;padding:30px 14px 18px;min-height:500px;display:flex;flex-direction:column;gap:8px;}\n.sms-bar{font-family:'JetBrains Mono',monospace;font-size:9px;color:#fff;text-align:center;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;padding:0 8px;}\n.sms-bar .sig{display:flex;gap:3px;align-items:end;}\n.sms-bar .b{width:3px;background:#fff;}\n.sms-from{font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.6);text-align:center;margin-bottom:6px;letter-spacing:.5px;}\n.sms-name{font-family:'Inter',sans-serif;font-size:14px;color:#fff;text-align:center;font-weight:600;margin-bottom:14px;}\n.sms-msg{background:#262628;color:#fff;padding:12px 14px;border-radius:18px 18px 18px 4px;font-size:13px;line-height:1.45;max-width:84%;align-self:flex-start;}\n.sms-msg b{color:var(--c4-green);font-weight:700;}\n.sms-msg .link{color:#4DA6FF;text-decoration:underline;}\n.sms-msg + .sms-msg{margin-top:2px;}\n.sms-time{font-family:'Inter',sans-serif;font-size:10px;color:rgba(255,255,255,.4);text-align:center;margin:6px 0;}\n\n/* ====== SINGLE OFFER ====== */\n.tier-intro{font-size:17px;color:var(--ink);max-width:820px;margin-bottom:36px;line-height:1.55;}\n.tier-intro strong{font-weight:600;}\n\n.single-offer{background:#fff;border:3px solid var(--c4-black);box-shadow:14px 14px 0 var(--c4-green);position:relative;}\n.so-head{background:var(--c4-black);color:#fff;padding:48px 48px 40px;display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:center;border-bottom:4px solid var(--c4-green);}\n.so-head .kind{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:14px;}\n.so-head .name{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(64px,8vw,140px);line-height:.88;letter-spacing:1px;color:#fff;margin-bottom:10px;}\n.so-head .name .g{color:var(--c4-green);}\n.so-head .name .r{color:var(--c4-red);}\n.so-head .tag{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1.5px;color:rgba(255,255,255,.7);text-transform:uppercase;line-height:1.6;}\n.so-head .price-block{text-align:right;border-left:1px solid rgba(255,255,255,.2);padding-left:48px;}\n.so-head .price{font-family:'Anton','Bebas Neue',sans-serif;font-size:140px;line-height:.85;letter-spacing:-3px;color:var(--c4-green);}\n.so-head .price .pre{font-size:50px;color:rgba(255,255,255,.7);vertical-align:top;line-height:1.2;margin-right:6px;}\n.so-head .per{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:10px;}\n.so-head .badge{display:inline-block;background:var(--c4-red);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;font-weight:700;padding:6px 14px;text-transform:uppercase;margin-bottom:20px;}\n\n.so-events{padding:32px 48px;background:var(--bg2);display:grid;grid-template-columns:1fr 60px 1fr;gap:24px;align-items:center;border-bottom:2px solid var(--c4-black);}\n.so-event{display:flex;flex-direction:column;}\n.so-event .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-red);text-transform:uppercase;font-weight:700;margin-bottom:6px;}\n.so-event .name{font-family:'Anton','Bebas Neue',sans-serif;font-size:48px;line-height:.95;letter-spacing:1px;color:var(--c4-black);}\n.so-event .date{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:1px;color:var(--ink);margin-top:6px;font-weight:600;}\n.so-event .desc{font-size:12px;color:var(--muted);line-height:1.55;margin-top:8px;}\n.so-events .plus{font-family:'Anton',sans-serif;font-size:80px;color:var(--c4-red);text-align:center;line-height:.85;}\n\n.so-body{padding:48px;display:grid;grid-template-columns:1fr 1fr;gap:40px 56px;}\n.so-sec{}\n.so-sec-k{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-red);font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--c4-black);display:flex;justify-content:space-between;align-items:baseline;}\n.so-sec-k .small{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);font-weight:500;letter-spacing:1px;}\n.so-sec ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;}\n.so-sec li{font-size:13px;line-height:1.55;color:var(--ink);padding-left:20px;position:relative;}\n.so-sec li::before{content:'■';position:absolute;left:0;top:2px;color:var(--c4-red);font-size:11px;}\n.so-sec li strong{font-weight:700;}\n.so-sec li.headline::before{color:var(--c4-green);content:'★';}\n\n.so-foot{padding:32px 48px;background:var(--c4-green);border-top:3px solid var(--c4-black);display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center;}\n.so-foot .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-black);text-transform:uppercase;font-weight:700;margin-bottom:8px;}\n.so-foot .v{font-family:'Anton','Bebas Neue',sans-serif;font-size:32px;line-height:1.05;letter-spacing:.5px;color:var(--c4-black);}\n.so-foot .v .r{color:var(--c4-red);}\n.so-foot .price-recap{text-align:right;}\n.so-foot .price-recap .small{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-black);font-weight:600;}\n.so-foot .price-recap .big{font-family:'Anton','Bebas Neue',sans-serif;font-size:64px;line-height:.9;color:var(--c4-black);letter-spacing:-1px;}\n\n/* ====== CTA ====== */\n.cta{padding:96px 0;background:var(--c4-black);color:#fff;text-align:left;border-top:4px solid var(--c4-green);}\n.cta-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:80px;align-items:center;}\n.cta h2{font-family:'Anton','Bebas Neue',sans-serif;font-size:clamp(64px,8vw,120px);line-height:.88;letter-spacing:1px;margin-bottom:24px;}\n.cta h2 .r{color:var(--c4-red);}\n.cta h2 .g{color:var(--c4-green);}\n.cta p{font-size:17px;line-height:1.55;color:rgba(255,255,255,.75);max-width:560px;margin-bottom:36px;}\n.cta-actions{display:flex;flex-direction:column;gap:14px;}\n.cta-act{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-top:1px solid rgba(255,255,255,.18);font-size:14px;text-decoration:none;color:#fff;transition:transform .2s,padding .2s;}\n.cta-act:last-of-type{border-bottom:1px solid rgba(255,255,255,.18);}\n.cta-act:hover{padding-left:8px;color:var(--c4-green);}\n.cta-act .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);}\n.cta-act .v{font-weight:500;}\n.cta-act .arr{font-family:'JetBrains Mono',monospace;color:var(--c4-green);}\n\n/* ====== CASE STUDIES ====== */\n.cs-card{background:#fff;color:var(--ink);border:2px solid var(--c4-black);margin-bottom:32px;overflow:hidden;}\n.cs-card-hdr{display:grid;grid-template-columns:280px 1fr;border-bottom:2px solid var(--c4-black);}\n.cs-card-l{padding:32px;background:var(--c4-red);color:#fff;}\n.cs-card-l .cs{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;margin-bottom:12px;font-weight:700;color:rgba(255,255,255,.85);}\n.cs-card-l .name{font-family:'Anton','Bebas Neue',sans-serif;font-size:52px;line-height:.9;letter-spacing:1px;}\n.cs-card-l .meta{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:14px;color:rgba(255,255,255,.75);}\n.cs-card-body{padding:32px;display:flex;flex-direction:column;justify-content:center;}\n.cs-card-body .th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-red-dk);margin-bottom:8px;font-weight:600;}\n.cs-card-body p{font-size:15px;line-height:1.6;color:var(--ink);font-weight:400;}\n.cs-stats{display:grid;grid-template-columns:repeat(3,1fr);}\n.cs-stat{padding:28px;border-right:2px solid var(--c4-black);}\n.cs-stat:last-child{border-right:none;}\n.cs-stat .big{font-family:'Anton','Bebas Neue',sans-serif;font-size:64px;line-height:.85;color:var(--c4-black);background:var(--c4-green);display:inline-block;padding:0 8px;letter-spacing:-1px;}\n.cs-stat .big .sm{font-size:24px;color:var(--c4-red);}\n.cs-stat .lbl{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--ink);margin:10px 0 8px;text-transform:uppercase;}\n.cs-stat .d{font-size:12px;line-height:1.55;color:var(--muted);}\n.cs-card-foot{padding:24px 32px;background:var(--c4-black);color:#fff;border-top:2px solid var(--c4-black);}\n.cs-card-foot .ins{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);margin-bottom:6px;font-weight:600;}\n.cs-card-foot p{font-size:14px;line-height:1.6;color:rgba(255,255,255,.9);}\n.cs-card-foot p strong{color:var(--c4-green);}\n\n/* ====== FOOTER ====== */\nfooter{padding:32px 56px;background:var(--c4-black);color:#fff;border-top:4px solid var(--c4-green);display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;}\n.foot-l{font-family:'Anton','Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;display:flex;align-items:center;gap:14px;}\n.foot-l .x{color:var(--c4-green);margin:0 4px;}\n.foot-l img{height:28px;width:auto;background:#fff;padding:4px 8px;}\n.foot-c{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);}\n\n@media(max-width:980px){\n  .wrap{padding:0 28px;}\n  .topbar{padding:14px 28px;}\n  .cover-meta{grid-template-columns:repeat(2,1fr);}\n  .cover-sub{grid-template-columns:1fr;gap:36px;}\n  .sec-hd{grid-template-columns:1fr;gap:16px;}\n  .sec-meta{text-align:left;}\n  .exec-grid,.aud-grid,.playbook,.cta-grid,.energy-stat-row,.competitor-grid,.deliv-grid,.channel-grid,.dual-headline,.influence-grid,.energy-callout,.foot-in-door,.loc-grid,.cs-stats,.cs-card-hdr,.so-head,.so-events,.so-body,.so-foot,.head-runway{grid-template-columns:1fr !important;}\n  .exec-cell{border-right:none;border-bottom:1px solid rgba(0,0,0,.18);padding:24px 0 !important;}\n  .host-grid{grid-template-columns:repeat(2,1fr);}\n  .align-table{grid-template-columns:1fr;}\n  .at-cell{border-right:none !important;}\n  .overlay-callout{grid-template-columns:1fr;padding:32px 24px;}\n  .energy-hero{padding:48px 28px;margin:0 -28px 36px;}\n  .esta . It's the cultural detonator for C4's Atlanta year.\n      <\u002Fp>\n      <div class=\"cover-byline\">\n        <strong>UNFAZED EXHIBIT<\u002Fstrong><br>\n        Atlanta's most viral streetwear &amp; cultural platform.<br>\n        Founded 2023 · 21 sold-out editions ·<br>\n        Hosts: Quavo · Lil Yachty · DDG · Duke Dennis · Fanum · Quan<br><br>\n        <strong>michael@unfazedexhibit.com<\u002Fstrong>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ QUAVO × ATLANTA + CONFIRMED PARTNERS ============ -->\n<section id=\"quavo-atl\" class=\"dark\" data-screen-label=\"00B Quavo · Atlanta\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\" style=\"font-size:48px;\">◆<\u002Fdiv>\n      <div>\n        <div class=\"label\" style=\"color:var(--c4-green);\">◆ The Headline · Quavo · Aug 29<\u002Fdiv>\n        <h2 class=\"sec-title\">Quavo doesn't visit Atlanta.<br><span style=\"color:var(--c4-green);\">He runs it.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\" style=\"color:rgba(255,255,255,.5);\">Edition<br>Sat · Aug 29 · 2026<br>—<br>Next date<br>Oct 31 · Halloween<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"energy-hero\">\n      <h3>26M REACH.<br>ONE <span class=\"g\">CITY.<\u002Fspan><br>EVERY <span class=\"r\">COOLER.<\u002Fspan><\u002Fh3>\n      <p><strong>Quavo is Atlanta hip-hop royalty.<\u002Fstrong> Migos didn't just come out of Atlanta — they defined what modern Atlanta sounds like to the rest of the world. From the Nawf to the Hawks floor to every corner store in between, when Quavo moves, the city moves with him. On Aug 29, C4 doesn't borrow cultural credibility from Quavo — it inherits the voice of the city itself.<\u002Fp>\n\n      <div class=\"energy-stat-row\">\n        <div class=\"estat\">\n          <div class=\"n\">26M<\u002Fdiv>\n          <div class=\"k\">Total Reach · Quavo<\u002Fdiv>\n          <div class=\"d\">One of the most-followed voices Atlanta has ever produced — a daily presence across IG, TikTok, and the culture at large.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"estat\">\n          <div class=\"n\">#1<\u002Fdiv>\n          <div class=\"k\">ATL Hip-Hop Equity<\u002Fdiv>\n          <div class=\"d\">Migos, the sound, the Hawks, the city. Quavo is the cultural ceiling C4 needs to lock against every other can in the cooler.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"estat\">\n          <div class=\"n\">2.5K+<\u002Fdiv>\n          <div class=\"k\">In The Room · Aug 29<\u002Fdiv>\n          <div class=\"d\">A sold-out Foundry crowd — 87.5% aged 18–34, the exact cohort deciding the next decade of the energy category.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"estat\">\n          <div class=\"n\">Oct 31<\u002Fdiv>\n          <div class=\"k\">The Next Edition<\u002Fdiv>\n          <div class=\"d\">Quavo headlines the summer. The next Unfazed edition lands Oct 31 — a Halloween follow-on that keeps C4's momentum running into Q4.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CONFIRMED PARTNERS -->\n    <div class=\"cp-banner\">\n      <div class=\"cp-banner-flag\">★ ALREADY LOCKED IN<\u002Fdiv>\n      <div class=\"cp-banner-text\">\n        <div class=\"cp-banner-h\">THREE MAJOR BRANDS ARE <span class=\"g\">ALREADY CONFIRMED<\u002Fspan> FOR AUG 29.<\u002Fdiv>\n        <p>The Quavo edition is already stacked. As Headline Energy Partner, C4 slots <strong>alongside — not behind<\u002Fstrong> — names that don't activate lightly. Every one of them drives the crowd straight into the room the C4 Explosion Chamber sits at the front of.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cp-grid\">\n\n      <div class=\"cp-card\">\n        <div class=\"cp-stamp\">✓ CONFIRMED<\u002Fdiv>\n        <div class=\"cp-brand\">NIKE<\u002Fdiv>\n        <div class=\"cp-hook\">$5,000<br>CONTEST<\u002Fdiv>\n        <div class=\"cp-title\">Studio Fleece Design Contest<\u002Fdiv>\n        <p class=\"cp-desc\">Nike is running a <strong>Nike Studio Fleece design contest<\u002Fstrong> with a <strong>$5,000 giveaway<\u002Fstrong> tied to the edition — fans design, the community votes, winners revealed on the night. A creator-led brand moment that pulls the audience in for weeks before doors even open.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"cp-card\">\n        <div class=\"cp-stamp\">✓ CONFIRMED<\u002Fdiv>\n        <div class=\"cp-brand\">HIBBETT<\u002Fdiv>\n        <div class=\"cp-hook\">500<br>TICKETS<\u002Fdiv>\n        <div class=\"cp-title\">Purchased For Attendees<\u002Fdiv>\n        <p class=\"cp-desc\"><strong>Hibbett Sports is buying 500 tickets<\u002Fstrong> to give away to attendees — a 500-person demand injection straight into the room, every one of them a primed C4 sample target walking through the Chamber.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"cp-card\">\n        <div class=\"cp-stamp\">✓ CONFIRMED<\u002Fdiv>\n        <div class=\"cp-brand\">CREP<br>PROTECT<\u002Fdiv>\n        <div class=\"cp-hook\">FREE<br>KICKS<\u002Fdiv>\n        <div class=\"cp-title\">On-Site Shoe Giveaway<\u002Fdiv>\n        <p class=\"cp-desc\"><strong>Crep Protect is running a shoe giveaway<\u002Fstrong> on the night — sneaker culture meeting the floor, another reason the crowd shows up early and posts everything. The C4 Chamber lands in the same photo.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 01 — EXECUTIVE SUMMARY ============ -->\n<section id=\"exec\" data-screen-label=\"01 Executive Summary\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">01<\u002Fdiv>\n      <div>\n        <div class=\"label\">Executive Summary<\u002Fdiv>\n        <h2 class=\"sec-title\">The pitch in three numbers.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\">Read time<br>4 minutes<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"exec-grid\">\n      <div class=\"exec-cell\">\n        <div class=\"exec-num\">6<span class=\"unit\">M+<\u002Fspan><\u002Fdiv>\n        <div class=\"exec-cap\">Organic views · Quavo edition<\u002Fdiv>\n        <p class=\"exec-body\">Social impressions across host channels, attendee UGC, and partner content for the Quavo · Aug 29 edition. <strong>86.2% from non-followers<\u002Fstrong> — net-new C4 discovery, in C4's home growth market.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"exec-cell\">\n        <div class=\"exec-num\">87.5<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"exec-cap\">Audience aged 18–34<\u002Fdiv>\n        <p class=\"exec-body\">Source: IG Insights · 312K unique accounts reached per edition. The exact cohort that decides the next decade of the energy category — multicultural, hip-hop-native, performance-aware, and gym-going. <strong>The youth that loves energy drinks more every year.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"exec-cell\">\n        <div class=\"exec-num\">26<span class=\"unit\">M<\u002Fspan><\u002Fdiv>\n        <div class=\"exec-cap\">Quavo total reach<\u002Fdiv>\n        <div class=\"d\"><strong>Quavo (26M)<\u002Fstrong> — one of the most influential ATL-rooted voices in hip-hop, hosting Aug 29. A proven runway with the Unfazed audience and the cultural ceiling C4 needs in its home market.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 02 — STRATEGIC THESIS ============ -->\n<section id=\"thesis\" class=\"dark\" data-screen-label=\"02 Strategic Thesis\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">02<\u002Fdiv>\n      <div>\n        <div class=\"label\">Strategic Thesis<\u002Fdiv>\n        <h2 class=\"sec-title\">Why this isn't a sponsorship —<br>it's a <span style=\"color:var(--c4-green);\">cultural detonator.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\">Position<br>Headline Energy Partner<br>—<br>Risk profile<br>Low · proven format<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"thesis-line\">\n        <div class=\"thesis-tag\">01 / The Category Fight<\u002Fdiv>\n        <div class=\"thesis-body\">The energy-drink war is no longer about taurine — it's about <strong>which can the 18–34 cohort posts on the way to the function.<\u002Fstrong> Wellness lanes, fitness lanes, legacy lanes — all spoken for. C4's open lane is <strong>cultural performance — the pre-show, pre-game, pre-set ritual.<\u002Fstrong> Energy drinks are the fastest-growing CPG sub-category in the country and the youth cohort is the prize. Unfazed is exactly that moment, twice.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"thesis-line\">\n        <div class=\"thesis-tag\">02 / The Audience<\u002Fdiv>\n        <div class=\"thesis-body\">C4's growth pocket is the <strong>18–34 social-first cohort buying a can at the gas station on the way to the Saturday.<\u002Fstrong> Unfazed audiences are <strong>87.5% aged 18–34<\u002Fstrong>, multicultural, hip-hop-native, hyper-social, and already obsessed with energy drinks as a daily ritual. <strong>The youth's love for energy drinks is compounding year over year<\u002Fstrong> — whichever brand owns this room owns the next decade of the category.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"thesis-line\">\n        <div class=\"thesis-tag\">03 / The Voice<\u002Fdiv>\n        <div class=\"thesis-body\">Quavo on August 29 owns <strong>ATL hip-hop royalty<\u002Fstrong> — Migos, the sound, the city. C4 doesn't borrow cultural cred from Quavo; it inherits the voice of Atlanta itself, headlining in C4 colors. The brand earns a cultural cover-page in its home growth market.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"thesis-line\">\n        <div class=\"thesis-tag\">04 / Real Demand<\u002Fdiv>\n        <div class=\"thesis-body\">Every Unfazed edition produces a documented spike in energy-drink consumption from doors to last call. <strong>This is the exact ritual C4 needs to own at retail<\u002Fstrong> — the can in hand on the way in, the photo of the can on the post, the next-day cooler grab at the corner store. One headline edition = a citywide retail-priming event.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"thesis-line\">\n        <div class=\"thesis-tag\">05 / Earned Cultural Media<\u002Fdiv>\n        <div class=\"thesis-body\">Energy-drink marketing is a paid-CPM bloodbath. Unfazed delivers <strong>cultural earned media<\u002Fstrong> — 6M+ organic views per edition, host-channel pre-promo, attendee UGC, and a C4-branded recap that lives long after doors close. <strong>Distribution C4 can't buy on a Meta line.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 03 — ALIGNMENT MATRIX ============ -->\n<section id=\"align\" data-screen-label=\"03 Alignment Matrix\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">03<\u002Fdiv>\n      <div>\n        <div class=\"label\">Alignment Matrix<\u002Fdiv>\n        <h2 class=\"sec-title\">What C4 is built for — and what Unfazed delivers, line for line.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\">Sources<br>C4 brand &amp; product positioning<br>+ Unfazed analytics<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"align-table\">\n      <div class=\"at-head\">What C4 Energy Is Built For<\u002Fdiv>\n      <div class=\"at-head\">What Unfazed Delivers<\u002Fdiv>\n      <div class=\"at-head\">Fit<\u002Fdiv>\n\n      <div class=\"at-cell jd\">The pre-game ritual — the can opened before the moment starts. Pre-workout, pre-show, pre-set, pre-shift.<\u002Fdiv>\n      <div class=\"at-cell uf\">Every Unfazed edition is a <strong>7-hour pre-game<\u002Fstrong> that doesn't end until 8PM. The exact occasion C4 needs to own in the consumer's mind: \"I'm getting up for this — I need fuel.\" One headline edition, the biggest summer Saturday in Atlanta.<\u002Fdiv>\n      <div class=\"at-cell fit\">◆ DIRECT<\u002Fdiv>\n\n      <div class=\"at-cell jd\">18–34 social-first consumers — gym, hip-hop, gaming, college, late-night. The cohort writing C4's growth chart.<\u002Fdiv>\n      <div class=\"at-cell uf\">87.5% of audience aged 18–34. Multicultural majority. Atlanta colleges in full — the AUC (Spelman, Morehouse, Clark Atlanta), Georgia State, Georgia Tech and Kennesaw State — plus the broader gym/creator/nightlife crowd already in C4's target.<\u002Fdiv>\n      <div class=\"at-cell fit\">◆ DIRECT<\u002Fdiv>\n\n      <div class=\"at-cell jd\">Cultural credibility — the can has to feel native to gaming streams, rap videos, gym mirror selfies, college campuses.<\u002Fdiv>\n      <div class=\"at-cell uf\">Quavo (Migos · 26M) — hip-hop-native, ATL-born royalty. <strong>One of the most native voices in C4's actual lane<\u002Fstrong>, with a proven Unfazed runway behind him.<\u002Fdiv>\n      <div class=\"at-cell fit\">◆ DIRECT<\u002Fdiv>\n\n      <div class=\"at-cell jd\">Retail proximity — convenience stores, gyms, gas stations near the consumer's daily route. Top-of-cooler awareness.<\u002Fdiv>\n      <div class=\"at-cell uf\">Unfazed audience funnels through the Midtown / AUC / Buckhead / GT corridor — every QuikTrip, Vitamin Shoppe and Crunch Fitness inside that radius. Cultural moment → retail pull-through, by geography.<\u002Fdiv>\n      <div class=\"at-cell fit\">◆ DIRECT<\u002Fdiv>\n\n      <div class=\"at-cell jd\">Competitive edge in the cooler war — earned cultural distribution wins the cohort that decides the category.<\u002Fdiv>\n      <div class=\"at-cell uf\">2,500+ attendees on Aug 29. 6M+ organic views. A cultural news cycle built around C4 cans in hand. <strong>The exact air-cover the rest of the cooler is buying nine-figures of paid social to fake.<\u002Fstrong><\u002Fdiv>\n      <div class=\"at-cell fit\">◆ DIRECT<\u002Fdiv>\n\n      <div class=\"at-cell jd\">Cost-efficient cultural CPM — earned reach beats paid auction in the energy-drink fight.<\u002Fdiv>\n      <div class=\"at-cell uf\">A single buy gets C4 inside the headline Quavo edition — effective CPM blended across 6M+ organic views drops to a fraction of paid social benchmarks. <strong>A cultural moment at a fraction of the paid rate card.<\u002Fstrong><\u002Fdiv>\n      <div class=\"at-cell fit\">◆ DIRECT<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 03B — C4 COMPANY INITIATIVES ============ -->\n<section id=\"initiatives\" class=\"dark\" data-screen-label=\"03B C4 Initiatives\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">◆<\u002Fdiv>\n      <div>\n        <div class=\"label\">C4 Company Initiatives · Where Unfazed Plugs In<\u002Fdiv>\n        <h2 class=\"sec-title\">The specific initiatives C4 is pushing — and how this event <span style=\"color:var(--c4-green);\">moves each one forward.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\" style=\"color:rgba(255,255,255,.5);\">Method<br>Public C4 / Nutrabolt direction<br>+ Unfazed plug-in mapping<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:17px;color:rgba(255,255,255,.85);max-width:920px;margin-bottom:48px;line-height:1.6;font-weight:300;\">\n      C4 isn't a generic energy can — it's a brand on record about where it wants to grow next. Below: <strong style=\"color:#fff;\">six specific company initiatives C4 has signaled it's investing behind<\u002Fstrong>, and what the Unfazed × Quavo activation contributes to each one. The buy isn't a one-off sponsorship — it's a lever on six fronts C4 is already pushing.\n    <\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:2px solid rgba(255,255,255,.2);border-left:2px solid rgba(255,255,255,.2);\">\n\n      <div style=\"padding:36px 32px;border-right:2px solid rgba(255,255,255,.2);border-bottom:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:48px;color:var(--c4-green);line-height:.85;letter-spacing:-1px;\">01<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">C4 INITIATIVE<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;color:#fff;margin-bottom:12px;\">Owning the Youth Energy Market.<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.78);margin-bottom:18px;font-weight:300;\">C4 has been explicit about wanting to expand beyond the powerlifter base and capture the <strong style=\"color:#fff;\">18–34 youth cohort<\u002Fstrong> — the same cohort driving the fastest growth in the entire energy category and the loyalty pool that defines the next decade of cooler share.<\u002Fp>\n        <div style=\"padding:18px 20px;background:rgba(195,245,60,.08);border-left:4px solid var(--c4-green);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:8px;\">◆ HOW UNFAZED MOVES THIS<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#fff;\">2,500+ attendees on Aug 29 — <strong>87.5% in the exact 18–34 youth target<\u002Fstrong>. C4 owns the entry portal, the can in hand, the Saturday ritual. <strong style=\"color:var(--c4-green);\">This is the youth market in one room.<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 32px;border-right:2px solid rgba(255,255,255,.2);border-bottom:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:48px;color:var(--c4-green);line-height:.85;letter-spacing:-1px;\">02<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">C4 INITIATIVE<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;color:#fff;margin-bottom:12px;\">Cultural &amp; Music Partnerships.<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.78);margin-bottom:18px;font-weight:300;\">C4's most recent brand moves point at <strong style=\"color:#fff;\">cultural music partnerships<\u002Fstrong> as the next growth engine — moving beyond pure-athlete endorsement into hip-hop, DJs, festivals, and cultural moments. The strategy: be in the rooms where the can is part of the night, not a billboard outside it.<\u002Fp>\n        <div style=\"padding:18px 20px;background:rgba(195,245,60,.08);border-left:4px solid var(--c4-green);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:8px;\">◆ HOW UNFAZED MOVES THIS<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#fff;\"><strong>Quavo · Aug 29<\u002Fstrong> delivers ATL hip-hop royalty in C4 colors — Migos, the sound, the city, headlining in the same venue C4 owns the front door of. <strong style=\"color:var(--c4-green);\">A music/culture partnership in C4's home market<\u002Fstrong> — exactly the lane C4 is publicly investing behind.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 32px;border-right:2px solid rgba(255,255,255,.2);border-bottom:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:48px;color:var(--c4-green);line-height:.85;letter-spacing:-1px;\">03<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">C4 INITIATIVE<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;color:#fff;margin-bottom:12px;\">Gaming &amp; Esports Expansion.<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.78);margin-bottom:18px;font-weight:300;\">Gaming and streaming have been called out as a <strong style=\"color:#fff;\">priority growth vertical<\u002Fstrong> for C4 — the daily-can use case is identical to the powerlifter brief, but the attention pocket is 5–10× the size. Twitch + creator culture is the obvious open lane.<\u002Fp>\n        <div style=\"padding:18px 20px;background:rgba(195,245,60,.08);border-left:4px solid var(--c4-green);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:8px;\">◆ HOW UNFAZED MOVES THIS<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#fff;\"><strong>Quavo is a gaming-and-culture crossover voice<\u002Fstrong> — and the Unfazed roster runs deep with creator-economy talent (Duke Dennis, Fanum, AMP-adjacent). C4 reaches the Twitch + creator cohort through the same room and the post-event clip ecosystem. <strong style=\"color:var(--c4-green);\">A creator-culture moment without the esports rate card.<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 32px;border-right:2px solid rgba(255,255,255,.2);border-bottom:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:48px;color:var(--c4-green);line-height:.85;letter-spacing:-1px;\">04<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">C4 INITIATIVE<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;color:#fff;margin-bottom:12px;\">College Campus &amp; Sampling Push.<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.78);margin-bottom:18px;font-weight:300;\">C4 has stood up campus rep programs and direct sampling at college events as a documented growth motion. <strong style=\"color:#fff;\">Loyalty captured at 19 stays through the consumer's highest-CPG-LTV decade.<\u002Fstrong> Atlanta's college density makes it one of the highest-yield sampling cities in the country.<\u002Fp>\n        <div style=\"padding:18px 20px;background:rgba(195,245,60,.08);border-left:4px solid var(--c4-green);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:8px;\">◆ HOW UNFAZED MOVES THIS<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#fff;\">Unfazed's core cohort is <strong>Atlanta college students in full<\u002Fstrong> — AUC (Spelman, Morehouse, Clark Atlanta) <em>plus<\u002Fem> Georgia State, Georgia Tech, and Kennesaw State. <strong style=\"color:var(--c4-green);\">~2,500+ direct samples<\u002Fstrong> on the night, into the densest Atlanta college population the city offers.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 32px;border-right:2px solid rgba(255,255,255,.2);border-bottom:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:48px;color:var(--c4-green);line-height:.85;letter-spacing:-1px;\">05<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">C4 INITIATIVE<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;color:#fff;margin-bottom:12px;\">Convenience &amp; C-Store Pull-Through.<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.78);margin-bottom:18px;font-weight:300;\">Energy is won in the c-store cooler — gas stations, QuikTrips, supplement stores, campus markets. C4's growth depends on <strong style=\"color:#fff;\">pull-through demand at the cooler<\u002Fstrong>, not just placement. Cultural moments are the cleanest pull-through trigger the category has.<\u002Fp>\n        <div style=\"padding:18px 20px;background:rgba(195,245,60,.08);border-left:4px solid var(--c4-green);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:8px;\">◆ HOW UNFAZED MOVES THIS<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#fff;\">Every Unfazed attendee passes <strong>3+ C4 stockists on the way to and from the venue<\u002Fstrong>. SMS sequence + QR retail-offer redemption + post-event drip turns the cultural moment into <strong style=\"color:var(--c4-green);\">trackable retail pull-through<\u002Fstrong> at every ATL stockist.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 32px;border-right:2px solid rgba(255,255,255,.2);border-bottom:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.03);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:48px;color:var(--c4-green);line-height:.85;letter-spacing:-1px;\">06<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">C4 INITIATIVE<\u002Fdiv>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:30px;line-height:1.05;letter-spacing:.5px;color:#fff;margin-bottom:12px;\">Owned Content &amp; Brand-Channel Demand.<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.78);margin-bottom:18px;font-weight:300;\">C4's brand channels have publicly leaned into <strong style=\"color:#fff;\">recap-style, culturally-anchored content<\u002Fstrong> — the kind that pays paid amplification down. The constraint is supply: producing enough native, multicultural, hip-hop-fluent footage to feed the channels every week.<\u002Fp>\n        <div style=\"padding:18px 20px;background:rgba(195,245,60,.08);border-left:4px solid var(--c4-green);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--c4-green);text-transform:uppercase;font-weight:700;margin-bottom:8px;\">◆ HOW UNFAZED MOVES THIS<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#fff;\"><strong>Two \"Stay Explosive · ATL\" recap videos<\u002Fstrong>, two attendee reaction reels, an influencer skit, a contest announcement video, raw + finished — <strong style=\"color:var(--c4-green);\">an entire content library delivered to C4 channels<\u002Fstrong>, owned, ready for paid amplification and retail comms straight through Q4.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"margin-top:48px;padding:36px 44px;background:var(--c4-green);color:var(--c4-blac t-wrap:pretty;font-weight:300;\">\n        <strong style=\"color:#fff;font-weight:600;\">Gen-Z and young millennials are drinking more energy per capita than any cohort in U.S. category history.<\u002Fstrong> The lanes above are locked. The one that isn't — the <span style=\"color:var(--c4-green);font-weight:700;\">cultural performance<\u002Fspan> lane: pre-show, pre-set, pre-stream, pre-function — is wide open, and it's the lane the youth market actually lives in. <strong style=\"color:var(--c4-green);\">C4 can take over the youth market for energy drinks by planting its flag in the rooms that define the ritual.<\u002Fstrong> Unfazed × Quavo · Aug 29 is that room.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"energy-callout\">\n      <div class=\"big\">STAY<br>EXPLOSIVE.<\u002Fdiv>\n      <div>\n        <h4>THE COOLER WAR ISN'T WON ON THE LABEL. IT'S WON ON THE NIGHT.<\u002Fh4>\n        <p>C4's job in Atlanta is to be <strong>the can in the photo, the can on the IG story, the can in the gym selfie the next morning<\u002Fstrong>. None of that comes from a paid impression. It comes from being inside the moments the 18–34 cohort already cares about. <strong>Unfazed × Quavo · Aug 29<\u002Fstrong> is that moment.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 05 — ATL RETAIL MAP ============ -->\n<section id=\"locations\" style=\"background:var(--bg2);padding-top:0;padding-bottom:0;\" data-screen-label=\"05 ATL Retail Map\">\n  <div class=\"launch-band\">\n    <div class=\"wrap\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--c4-green);font-weight:700;\">\n        <span>◆ THE GEOGRAPHY<\u002Fspan><span style=\"color:#fff;opacity:.5;\">/<\u002Fspan><span style=\"color:rgba(255,255,255,.85);\">FY26 ATL CULTURAL CORRIDOR<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"launch-title\">ONE <span class=\"g\">CITY.<\u002Fspan><br>FOUR <span class=\"g\">CORRIDORS.<\u002Fspan><br>EVERY COOLER IN BETWEEN.<\u002Fh2>\n      <p class=\"launch-sub\">C4's distribution is everywhere in Atlanta — gyms, gas stations, supplement stores, college campuses, every cooler from the AUC to Buckhead. <strong style=\"color:var(--c4-green);\">What's missing is the cultural signal that points the customer at the cooler.<\u002Fstrong> Unfazed × Quavo is that signal, geo-tagged exactly where C4 already lives on shelf.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\" style=\"padding-top:64px;padding-bottom:96px;\">\n    <div class=\"sec-hd\" style=\"margin-bottom:32px;\">\n      <div class=\"sec-num\">05<\u002Fdiv>\n      <div>\n        <div class=\"label\">The Atlanta Cultural Corridor<\u002Fdiv>\n        <h2 class=\"sec-title\">A geography built for the <span style=\"background:var(--c4-red);color:var(--c4-green);padding:0 8px;\">college + culture<\u002Fspan> trade.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\">Footprint<br>4-corridor rollout<br>—<br>Window<br>FY26 summer<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:17px;color:var(--ink);max-width:820px;margin-bottom:32px;line-height:1.6;\">\n      The Unfazed audience map sits directly on top of C4's existing Atlanta retail footprint — the full college belt (AUC + Georgia State + Georgia Tech + Kennesaw State), Midtown, Buckhead, and the perimeter. Every cooler C4 is in is within a 15-minute drive of the venue where Quavo will be hosting 2,500+ people on Aug 29. <em>Cultural pull → retail pull-through, by geography.<\u002Fem>\n    <\u002Fp>\n\n    <div class=\"loc-grid\">\n      <div class=\"loc-card\">\n        <div class=\"stamp\">CORE<\u002Fdiv>\n        <div class=\"pin\">◆ CORRIDOR 01<\u002Fdiv>\n        <div class=\"name\">MIDTOWN<\u002Fdiv>\n        <div class=\"area\">Tech Square · GT · venue zone<\u002Fdiv>\n        <div class=\"note\">The Foundry sits insid COME<\u002Fdiv>\n        <h4>THIS PARTNERSHIP IS HOW <span class=\"r\">C4 OWNS<\u002Fspan> THE ATLANTA SUMMER.<\u002Fh4>\n        <p>A paid social campaign produces an impression. A press cycle produces a week of coverage. <strong style=\"color:var(--c4-green);\">Unfazed × Quavo produces a moment<\u002Fstrong> — 6M+ organic views, 300K+ unique accounts reached, 14K SMS subscribers texted in the city's most-followed group chat. <strong style=\"color:var(--c4-green);\">The summer becomes a C4 storyline.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 06 — HEADLINER (QUAVO) ============ -->\n<section id=\"headliners\" class=\"head-sec\" data-screen-label=\"06 Quavo Spotlight\">\n  <div class=\"head-top-bar\"><\u002Fdiv>\n  <div class=\"head-bg\" aria-hidden=\"true\"><\u002Fdiv>\n\n  <div class=\"wrap\" style=\"position:relative;z-index:2;\">\n    <div class=\"sec-hd\" style=\"border-bottom-color:rgba(255,255,255,.25);\">\n      <div class=\"sec-num\" style=\"font-size:48px;\">◆<\u002Fdiv>\n      <div>\n        <div class=\"label\" style=\"color:var(--c4-green);\">◆ THE HEADLINE EDITION<\u002Fdiv>\n        <h2 class=\"sec-title\">QUAVO. <span style=\"color:var(--c4-green);\">AUG 29.<\u002Fspan><br>ATLANTA <span style=\"color:var(--c4-red);\">ROYALTY.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\" style=\"color:rgba(255,255,255,.5);\">Date<br>Sat · Aug 29 · 2026<br>—<br>Lead time<br>Multi-month pre-promo<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:18px;color:rgba(255,255,255,.85);max-width:880px;margin:-24px 0 40px;line-height:1.55;font-weight:300;\">\n      <strong style=\"color:#fff;font-weight:600;\">One headliner. The biggest cultural lane in the city. One C4 buy.<\u002Fstrong> Quavo anchors the ATL hip-hop royalty lane on Aug 29 — and C4 owns the room he's headlining. No other voice carries Atlanta's sound the way Quavo does, and no other can gets to stand next to it e Quavo edition is the megaphone — the cultural cover-page of every cooler grab in the city through Q4.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"head-runway\">\n      <div class=\"icon\">→<\u002Fdiv>\n      <div>\n        <div class=\"label\" style=\"color:var(--c4-black);margin-bottom:8px;\">◆ THE COMPOUND EFFECT<\u002Fdiv>\n        <h4>AUG 29 HEADLINES. OCT 31 KEEPS IT RUNNING.<\u002Fh4>\n        <p>Quavo · Aug 29 produces the hip-hop wave that owns the city's late-summer. <strong>The weeks after are when C4's recap content runs on paid amplification, retail-rep teams pull through, and the UGC keeps piling on<\u002Fstrong> — and the next Unfazed edition on Oct 31 picks the momentum right back up into Q4. Lock the headline now and the storyline carries the brand straight through the back half of the year.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"influence-grid\">\n      <div class=\"infl\">\n        <div class=\"k\">◆ ATL INFLUENCE · 01<\u002Fdiv>\n        <div class=\"t\">The voice of the city.<\u002Fdiv>\n        <div class=\"d\">Quavo owns hip-hop royalty — the cultural ceiling C4 needs to lock against every other can in the Atlanta cooler. <strong>One partnership, the loudest lane in the city.<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"infl\">\n        <div class=\"k\">◆ ATL INFLUENCE · 02<\u002Fdiv>\n        <div class=\"t\">Atlanta is home turf.<\u002Fdiv>\n        <div class=\"d\">Quavo's lifelong ATL roots land back at The Foundry on the Unfazed series. <strong>The night becomes a C4-branded chapter<\u002Fstrong> of one of hip-hop's most-watched calendars — in C4's own home growth market.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"infl\">\n        <div class=\"k\">◆ ATL INFLUENCE · 03<\u002Fdiv>\n        <div class=\"t\">Recap content runs for weeks.<\u002Fdiv>\n        <div class=\"d\">The edition delivers a post-event content library. C4 gets <strong>a wave of
