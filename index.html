re-game; they post the show; they post the cooler grab the next morning. C4 is buying <em style=\"font-style:normal;font-weight:600;background:var(--c4-green);color:var(--c4-black);padding:1px 6px;\">direct access to its own ideal consumer<\u002Fem>, already gathered in one room, on the exact ritual occasion C4 needs to own.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 08 — HOST ROSTER ============ -->\n<section id=\"hosts\" data-screen-label=\"08 Host Roster\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">08<\u002Fdiv>\n      <div>\n        <div class=\"label\">Host Roster · Cultural Equity<\u002Fdiv>\n        <h2 class=\"sec-title\">Every host audience is a C4 audience. <span style=\"background:var(--c4-red);color:var(--c4-green);padding:0 8px;\">Quavo headlines.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\">Roster reach<br>75M+ accounts<br>—<br>Verified IG Insights<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:17px;color:var(--ink);max-width:820px;margin-bottom:40px;line-height:1.6;\">\n      Unfazed hosts don't post from the event — they co-build it. Each is the kind of voice that turns a brand from \"I've seen the ad\" into \"my friend cracks one before the gym.\" For C4 fighting to lead the cooler war on the same shelf as every other can, that's the difference between a paid impression and a daily consumer.\n    <\u002Fp>\n\n    <div class=\"host-grid\" style=\"grid-template-columns:repeat(4,1fr);\">\n      <div class=\"host headline-q\">\n        <div class=\"crown\">◆ AUG 29 HEADLINE<\u002Fdiv>\n        <div class=\"host-name\">QUAVO<\u002Fdiv>\n        <div class=\"host-role\">Rapper · Migos · ATL royalty<\u002Fdiv>\n        <div class=\"host-stat\">26M<\u002Fdiv>\n        <div class=\"host-stat-l\">Total reach<\u002Fdiv>\n        <div class=\"host-edition\">AUG 29 · 2026 · CONFIRMED<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\" iv>\n      <div>\n        <div class=\"label\">Scope of Partnership · The Three Pillars<\u002Fdiv>\n        <h2 class=\"sec-title\">What C4 walks away with: <span style=\"color:var(--c4-green);\">reach, real-world footprint, and a Stay-Explosive content library.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\" style=\"color:rgba(255,255,255,.5);\">Lead time<br>8 weeks pre-event<br>—<br>Tail<br>30 days post-event<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:16px;line-height:1.6;color:rgba(255,255,255,.78);max-width:880px;margin:-24px 0 40px;text-wrap:pretty;\">\n      The deliverable surface area, organized in three pillars. Every line in the menu is built for the Quavo · Aug 29 edition under a single buy. <strong style=\"color:#fff;\">A city-wide pre-launch marketing engine<\u002Fstrong>, <strong style=\"color:#fff;\">a branded C4 Explosion Chamber footprint at the show<\u002Fstrong>, and <strong style=\"color:#fff;\">an owned content suite that introduces C4 to the city in its own voice<\u002Fstrong>.\n    <\u002Fp>\n\n    <div class=\"playbook\">\n      <div class=\"pb\">\n        <div class=\"pb-num\">A<\u002Fdiv>\n        <div class=\"pb-tag\">Pillar 01 · Pre-Event · Reach &amp; Demand<\u002Fdiv>\n        <div class=\"pb-title\">A city-wide marketing engine — pointed at every C4 cooler in Atlanta.<\u002Fdiv>\n        <div class=\"pb-desc\">Eight weeks of paid + owned media before the edition. <strong>C4 lockup on the Quavo flyer<\u002Fstrong>, a dedicated partner flyer post with <strong>#FUELTHECREW<\u002Fstrong> contest details on slide two, and the 14K-subscriber SMS list drip-fed C4 retail offer codes. Host roster posts the C4 angle natively. By show day, the audience already knows what's in the cooler.<\u002Fdiv>\n        <div class=\"pb-mech\">\n          <div class=\"pb-mech-l\">What C4 receives<\u002Fdiv>\n          <ul>\n            <li>C4 lockup on master Quavo flyer · 26M+ host reach<\u002Fli>\n            <li>Dedicated C4 partner flyer post · <strong>#FUELTHECREW UGC contest on slide 2<\u002Fstrong><\u002Fli>\n            <li><strong>10× Unfazed story posts<\u002Fstrong> with link to C4 offer<\u002Fli>\n            <li>Up to <strong>5× dedicated SMS blasts<\u002Fstrong> to 14K opt-in subs<\u002Fli>\n            <li>C4 block + retail offer code in the Quavo ticket emails<\u002Fli>\n            <li>Host IG stories with C4 pre-game angle<\u002Fli>\n            <li>Pre-event influencer skit promo video<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pb\">\n        <div class=\"pb-num\">B<\u002Fdiv>\n        <div class=\"pb-tag\">Pillar 02 · Day-Of · The C4 Explosion Chamber<\u002Fdiv>\n        <div class=\"pb-title\">An immersive C4-branded entry portal — the front door of every photo.<\u002Fdiv>\n        <div class=\"pb-desc\">A custom <strong>C4 Explosion Chamber<\u002Fstrong> — a neon-lit walk-through portal at The Foundry's main entrance, branded in C4 black + electric green + explosive red. <strong>Every attendee walks through it twice<\u002Fstrong> (entry and exit). 2–4 C4 reps inside handing ice-cold cans, a BPM-reactive lighting moment for the photo wall, and a #FUELTHECREW prize claim point. The chamber IS the activation.<\u002Fdiv>\n        <div class=\"pb-mech\">\n          <div class=\"pb-mech-l\">What C4 receives<\u002Fdiv>\n          <ul>\n            <li><strong>C4 Explosion Chamber installed at venue entrance<\u002Fstrong><\u002Fli>\n            <li>2–4 C4 reps inside chamber · 7-hour window<\u002Fli>\n            <li>Ice-cold can distribution at chamber + exit funnel<\u002Fli>\n            <li><strong>BPM-reactive LED photo wall<\u002Fstrong> — branded UGC moment<\u002Fli>\n            <li>QR retail-offer redemption at every Atlanta C4 stockist<\u002Fli>\n            <li><strong>#FUELTHECREW UGC contest prize drops at the chamber<\u002Fstrong><\u002Fli>\n            <li><strong>Full category exclusivity<\u002Fstrong> — no competing energy brand activates<\u002Fli>\n            <li>\"Headline Energy Partner\" designation in all on-site signage<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pb\">\n        <div class=\"pb-num\">C<\u002Fdiv>\n        <div class=\"pb-tag\">Pillar 03 · Content Library · Stay Explosive<\u002Fdiv>\n        <div class=\"pb-title\">A \"Stay Explosive · ATL\" content library — built around the cultural moment.<\u002Fdiv>\n        <div class=\"pb-desc\">The content C4 owns long after the night. A full suite built around a <em style=\"color:var(--c4-green);font-style:normal;\">\"Stay Explosive\"<\u002Fem> creative direction — C4 introduced to the city in the city's own voice, captured on the biggest summer Saturday in Atlanta. Quavo appears as <strong>in-attendance placement<\u002Fstrong> (not paid endorsement). Every piece is delivered raw + finished, owned by C4, ready for paid amplification or retail comms.<\u002Fdiv>\n        <div class=\"pb-mech\">\n          <div class=\"pb-mech-l\">What C4 receives<\u002Fdiv>\n          <ul>\n            <li><strong>\"Stay Explosive · ATL\" brand recap video<\u002Fstrong> · hero asset<\u002Fli>\n            <li><strong>Attendee reaction video<\u002Fstrong> — Atlanta cracking C4 on-camera<\u002Fli>\n            <li><strong>UGC contest giveaway announcement video<\u002Fstrong> · C4-led<\u002Fli>\n            <li><strong>Influencer skit promo video<\u002Fstrong> · co-produced with Unfazed creators<\u002Fli>\n            <li>Quavo + host roster in-attendance placement in the recap<\u002Fli>\n            <li>#FUELTHECREW hero footage · attendee POV<\u002Fli>\n            <li>30-day post-event SMS retargeting to opt-in attendees<\u002Fli>\n            <li>All footage delivered <strong>raw + finished, owned by C4<\u002Fstrong><\u002Fli>\n            <li>Full reach + impressions report post-event<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:32px;padding:22px 28px;background:rgba(195,245,60,.08);border:1px solid rgba(195,245,60,.3);border-left:6px solid var(--c4-green);\">\n      <div class=\"label\" style=\"margin-bottom:6px;font-size:10px;color:var(--c4-green);\">◆ The line through all three pillars<\u002Fdiv>\n      <p style=\"font-size:15px;line-height:1.6;color:#fff;margin:0;text-wrap:pretty;\">\n        Pillar A drives <strong>the city to the moment<\u002Fstrong>. Pillar B <strong>puts C4 inside the moment<\u002Fstrong>. Pillar C <strong>turns the moment into a content asset C4 owns forever<\u002Fstrong> — Atlanta meeting C4 in the rooms it already lives in. The single $25K offer on page 13 covers all three.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 10 — C4 EXPLOSION CHAMBER RENDER ============ -->\n<section id=\"render\" style=\"background:#0a0a0a;color:#fff;border-bottom:none;\" data-screen-label=\"10 Activation Render\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">10<\u002Fdiv>\n      <div>\n        <div class=\"label\">The C4 Explosion Chamber · Activation Render<\u002Fdiv>\n        <h2 class=\"sec-title\">C4 at the door <span style=\"color:var(--c4-green);\">/<\u002Fspan> The Foundry, Atlanta.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\" style=\"color:rgba(255,255,255,.5);\">Subject<br>Venue-front portal activation<br>—<br>Edition<br>Aug 29 · Quavo<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:18px;color:rgba(255,255,255,.85);max-width:820px;margin-bottom:40px;line-height:1.55;font-weight:300;\">\n      The single highest-impact thing C4 can do at the edition: <strong style=\"color:#fff;font-weight:600;\">make the front door of the venue the front door of the brand.<\u002Fstrong> A custom-built <strong style=\"color:var(--c4-green);font-weight:700;\">C4 Explosion Chamber<\u002Fstrong> — a neon-lit walk-through portal at The Foundry's entrance — every one of eight:600;\">Built for the Quavo · Aug 29 edition<\u002Fstrong> at The Foundry, Atlanta.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px;\">Brand language · C4 black + electric green + explosive red<\u002Fdiv>\n        <div style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.85);font-weight:300;max-width:480px;margin-left:auto;\">\n          Reads as C4 putting on the show — not a sponsor booth. Every attendee passes through it on the way in and out. The line photographs it. The end-of-night exit funnels back into it for #FUELTHECREW prize claims and retail QR codes.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:36px 40px;background:var(--c4-red);color:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:32px;align-items:center;\">\n      <div>\n        <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:60px;line-height:.9;color:var(--c4-green);\">100%<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9);margin-top:8px;font-weight:700;\">Attendee Walk-Through<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:60px;line-height:.9;color:var(--c4-green);\">7 hr<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9);margin-top:8px;font-weight:700;\">Total Activation Window<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:60px;line-height:.9;color:var(--c4-green);\">2.5K+<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9);margin-top:8px;font-weight:700;\">Direct Samples On The Night<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:60px;line-height:.9;color:var(--c4-green);\">2×<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.9);margin-top:8px;font-weight:700;\">Touchpoints (enter + exit)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin-top:32px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.5);font-style:italic;\">\n      Conceptual render. Chamber fabrication, LED spec, rep placement and beverage-handling logistics final-set with C4 ops + Nutrabolt brand team. Venue load-in and curb access coordinated by Unfazed production.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 11 — DELIVERABLES ============ -->\n<section id=\"deliverables\" style=\"background:var(--bg);\" data-screen-label=\"11 Deliverables\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">11<\u002Fdiv>\n      <div>\n        <div class=\"label\">What Unfazed Delivers To C4<\u002Fdiv>\n        <h2 class=\"sec-title\">Eleven deliverables. <span style=\"background:var(--c4-red);color:var(--c4-green);padding:0 8px;\">All C4-branded. Aug 29.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\">Includes<br>Flyers · Stories · Video · Email · SMS · Chamber<br>—<br>Scope · single $30K offer<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:17px;color:var(--ink);max-width:820px;margin-bottom:40px;line-height:1.55;\">\n      The <strong>full menu<\u002Fstrong> built for the Quavo · Aug 29 edition. Every workstream listed is a real, production-ready asset Unfazed builds in-house and ships against the night.\n    <\u002Fp>\n\n    <div class=\"deliv-grid\">\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">01<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre-Event · Print + Digital · Quavo Edition<\u002Fdiv>\n        <div class=\"deliv-title\">C4 lockup on the master flyer.<\u002Fdiv>\n        <div class=\"deliv-desc\">C4 logo placed on the master Quavo flyer. The flyer is the most-shared asset of the cycle — the host reposts it, attendees repost it, the press uses it. C4 rides the cultural wave by being on it.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Where it lives<\u002Fdiv>\n          <ul>\n            <li>Quavo host-channel reposts (26M)<\u002Fli>\n            <li>@unfazedexhibit posts · stories · grid<\u002Fli>\n            <li>14K SMS list · pre-event drip<\u002Fli>\n            <li>Email blast · 80K+ open rate<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">02<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre-Event · Dedicated Asset · Quavo Edition<\u002Fdiv>\n        <div class=\"deliv-title\">Dedicated C4 partner flyer post.<\u002Fdiv>\n        <div class=\"deliv-desc\">Standalone C4-led flyer posts — separate from the master — built around C4's retail offer + #FUELTHECREW hook. <strong>Slide 1<\u002Fstrong> carries the C4 flyer; <strong>slide 2 carries the #FUELTHECREW UGC contest details<\u002Fstrong> so the announcement and the entry mechanic ship in the same post. Built for the Quavo edition.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">What each contains<\u002Fdiv>\n          <ul>\n            <li>Slide 1 · C4 flyer · ATL retail call-out + offer code<\u002Fli>\n            <li>Slide 2 · #FUELTHECREW contest details · how to enter + prizes<\u002Fli>\n            <li>\"Stay Explosive · ATL\" creative direction<\u002Fli>\n            <li>Pushed by host channels · 72-hour pre-event window<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">03<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre-Event · Co-Produced Content<\u002Fdiv>\n        <div class=\"deliv-title\">10× Unfazed story posts with link to C4 offer.<\u002Fdiv>\n        <div class=\"deliv-desc\">Co-produced Unfazed story posts promoting <strong>anything of C4's choice<\u002Fstrong> — retail launches, the #FUELTHECREW contest, sampling reminders, the Aug 29 activation — with the <strong>link to the C4 offer included<\u002Fstrong> directly in the story. Distributed on the Unfazed runway.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Volume + cadence<\u002Fdiv>\n          <ul>\n            <li><strong>10× story posts total<\u002Fstrong> · across the runway<\u002Fli>\n            <li>Every post carries swipe-up / link sticker to C4 offer<\u002Fli>\n            <li>Programmed at high-engagement windows · weeknight + weekend<\u002Fli>\n            <li>Creative direction shared 7 days pre-publish for C4 approval<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">04<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre-Event · Optional Swap · Quavo Edition<\u002Fdiv>\n        <div class=\"deliv-title\">Instagram collab post · C4 choice.<\u002Fdiv>\n        <div class=\"deliv-desc\">A single <strong>IG collab post<\u002Fstrong> co-published from <strong>@unfazedexhibit<\u002Fstrong> and <strong>@c4energy<\u002Fstrong> — C4 picks the creative direction. Available <em>in lieu of<\u002Fem> a portion of the 10× story posts when a higher-leverage single placement is preferred over volume.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Format<\u002Fdiv>\n          <ul>\n            <li>Native IG collab post · appears on both grids<\u002Fli>\n            <li>Creative + caption direction · C4 choice<\u002Fli>\n            <li>Reach pooled across both follower bases<\u002Fli>\n            <li>Available as a swap-out option for story volume<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">05<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre-Event · Video<\u002Fdiv>\n        <div class=\"deliv-title\">Influencer skit promo video.<\u002Fdiv>\n        <div class=\"deliv-desc\">A short-form skit produced with Unfazed-affiliated influencers <strong>in the weeks leading into the edition<\u002Fstrong> — building demand AND signaling that <em style=\"font-style:normal;background:var(--c4-green);color:var(--c4-black);padding:0 6px;font-weight:700;\">C4 will be fueling the crew on-site<\u002Fem>. Native creator voices, not a sponsor reel. Cross-posted to C4 channels raw + finished.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Format<\u002Fdiv>\n          <ul>\n            <li>30–60 sec vertical · IG + TikTok<\u002Fli>\n            <li>Drops in the pre-event window<\u002Fli>\n            <li>Hook: \"C4 pulling up to Quavo\"<\u002Fli>\n            <li>Cross-posted to C4 channels raw + finished<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">06<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre-Event · Video<\u002Fdiv>\n        <div class=\"deliv-title\">#FUELTHECREW contest giveaway announcement video.<\u002Fdiv>\n        <div class=\"deliv-desc\">A dedicated short-form video announcing the <strong>#FUELTHECREW UGC contest + giveaway<\u002Fstrong> — what fans can win, how to enter, when winners are claimed on-site at the C4 Explosion Chamber. The single most-shared asset that launches the contest and drives entries through the pre-event window.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Format<\u002Fdiv>\n          <ul>\n            <li>30–45 sec vertical · IG + TikTok · cross-posted to C4 channels<\u002Fli>\n            <li>C4 swag + year-supply prize reveal · VIP passes<\u002Fli>\n            <li>#FUELTHECREW + @c4energy entry mechanic on-screen<\u002Fli>\n            <li>Drops at contest open · pinned through entry window<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">07<\u002Fdiv>\n        <div class=\"deliv-tag\">Post-Event · Video · Quavo Edition<\u002Fdiv>\n        <div class=\"deliv-title\">Attendee C4 reaction video.<\u002Fdiv>\n        <div class=\"deliv-desc\">On-site videos capturing <strong>attendees cracking C4 and giving live reactions<\u002Fstrong> — real reactions, real crew, real voices from the night. The cultural answer to \"what does it taste like, what's the flavor I should grab next?\" delivered by the exact 18–34 ATL audience C4 needs at retail.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Coverage<\u002Fdiv>\n          <ul>\n            <li>Live attendee tastings · flavor reactions · candid shots<\u002Fli>\n            <li>Mix of named influencers + everyday attendees<\u002Fli>\n            <li>Crew + flavor-reaction cutdowns<\u002Fli>\n            <li>30–60 sec cutdown for IG + TikTok<\u002Fli>\n            <li>Delivered raw + finished to C4 channels<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">08<\u002Fdiv>\n        <div class=\"deliv-tag\">Post-Event · Video · Quavo Edition<\u002Fdiv>\n        <div class=\"deliv-title\">\"Stay Explosive · ATL\" brand recap video.<\u002Fdiv>\n        <div class=\"deliv-desc\">A short-form <strong>brand recap video<\u002Fstrong> built around C4's presence on the night — the Explosion Chamber, the crew, the moment. Distributed across host + Unfazed channels and handed to C4 raw + finished. <strong>Her n<\u002Fstrong> — tagged <strong>#FUELTHECREW<\u002Fstrong> + <strong>@c4energy<\u002Fstrong> — and the most creative posts win <em style=\"font-style:normal;background:var(--c4-green);color:var(--c4-black);padding:0 6px;font-weight:700;\">on-site prize drops at the C4 Explosion Chamber<\u002Fem>: VIP passes, exclusive C4 swag, a year-supply of C4, and front-of-line at the sampling chamber. Manufactures post-volume BEFORE the night even starts.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Mechanics<\u002Fdiv>\n          <ul>\n            <li>Entry window · T–21 to T–2 days<\u002Fli>\n            <li>Tag #FUELTHECREW + @c4energy to enter<\u002Fli>\n            <li>Winners claim prizes on-site at the Chamber · Aug 29<\u002Fli>\n            <li>Prize tiers · VIP passes, swag, year-supply of C4<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"deliv\">\n        <div class=\"deliv-num\">11<\u002Fdiv>\n        <div class=\"deliv-tag\">Pre + Post-Event · SMS Channel · Quavo Edition<\u002Fdiv>\n        <div class=\"deliv-title\">C4 offer on the SMS system · 5× blasts.<\u002Fdiv>\n        <div class=\"deliv-desc\">Unfazed's 14K-subscriber SMS system is the most direct line to the attendee. We embed C4's retail offer info — code, nearest stockist, redemption mechanic — in the pre + post-event SMS drip. <strong>SMS open rates run 95%+;<\u002Fstrong> this is the highest-conversion channel in the package. <strong>5× dedicated C4 blasts<\u002Fstrong> + 30-day post-event retargeting.<\u002Fdiv>\n        <div class=\"deliv-mech\">\n          <div class=\"deliv-mech-l\">Drip schedule<\u002Fdiv>\n          <ul>\n            <li>T–14 days · \"C4 is fueling Quavo Saturday\"<\u002Fli>\n            <li>T–7 days · retail offer code reminder<\u002Fli>\n            <li>T–24 hrs · Explosion Chamber tomorrow<\u002Fli>\n            <li>T–2 hrs · \"Doors are open — C4 inside the Chamber\"<\u002Fli>\n ost-event SMS retargeting<\u002Fli>\n            <li>Launch blast tagged to nearest ATL C4 stockist<\u002Fli>\n            <li>T–14 / T–7 / T–24h / T–2h cadence<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"so-sec\">\n          <div class=\"so-sec-k\">◆ On-Site Footprint <span class=\"small\">Aug 29<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li class=\"headline\"><strong>Full C4 Explosion Chamber installed at venue entrance<\u002Fstrong><\u002Fli>\n            <li>Custom-fab walk-through portal · neon-green LED rim · BPM-reactive photo wall<\u002Fli>\n            <li>2–4 C4 reps inside the Chamber · 7-hour window<\u002Fli>\n            <li>Ice-cold can distribution at entry + exit · ~2,500+ direct samples<\u002Fli>\n            <li><strong>#FUELTHECREW contest prize claim point<\u002Fstrong> · on-site at the Chamber<\u002Fli>\n            <li>QR retail-offer redemption · directs to nearest ATL stockist<\u002Fli>\n            <li>End-of-night exit funnel + UGC photo moment<\u002Fli>\n            <li>Custom brand experience inside Chamber — C4 builds whatever direction it picks<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"so-sec\">\n          <div class=\"so-sec-k\">◆ Exclusivity &amp; Press<\u002Fdiv>\n          <ul>\n            <li class=\"headline\"><strong>FULL ENERGY-CATEGORY EXCLUSIVITY<\u002Fstrong> — no competing energy brand activates inside the edition<\u002Fli>\n            <li>\"Headline Energy Partner\" designation in all press &amp; recap content<\u002Fli>\n            <li>C4 lockup placement in all on-site signage at The Foundry<\u002Fli>\n            <li>Mention in any host on-stage thank-yous · Quavo<\u002Fli>\n            <li>Full reach + impressions report delivered post-event<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"so-foot\">\n        <div>\n          <div class=\"lbl\">◆ What this gets C4<\u002Fdiv>\n          <div class=\"v\">The cultural <span class=\"r\">detonator.<\u002Fspan> One night. One city. One C4 storyline.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"price-recap\">\n          <div class=\"small\">All-in · Quavo · Aug 29<\u002Fdiv>\n          <div class=\"big\">$30,000<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:40px;padding:24px 28px;background:#fff;border:2px solid var(--c4-black);border-left:6px solid var(--c4-red);\">\n      <div class=\"label\" style=\"margin-bottom:6px;font-size:10px;color:var(--c4-red);\">◆ Everything above is negotiable<\u002Fdiv>\n      <p style=\"font-size:15px;line-height:1.6;color:var(--ink);font-weight:400;margin:0;\">\n        <strong>Tell us what C4 wants to walk away with<\u002Fstrong> — a specific creative format, a Quavo can-collab moment, a Quavo-led content series, a flavor drop tied to the activation, a competitive-shaped callout against the rest of the cooler, or an Atlanta-college sub-activation across the AUC + GSU + GT + KSU corridor — and we'll rebuild the scope to match. The $30K is the headline takeover; the inside is fully flexible.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 14 — CASE STUDIES ============ -->\n<section id=\"success\" class=\"dark\" data-screen-label=\"14 Partnership Success\">\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">\n      <div class=\"sec-num\">14<\u002Fdiv>\n      <div>\n        <div class=\"label\">Partnership Success<\u002Fdiv>\n        <h2 class=\"sec-title\">Receipts. Not projections.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"sec-meta\" style=\"color:rgba(255,255,255,.5);\">Track record<br>2025 editions<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"max-width:920px;font-size:16px;color:rgba(255,255,255,.78);line-height:1.65;margin-bottom:48px;\">\n      Every claim in this dossier is grounded in a partnership we've already shipped. Two case studies — <strong style=\"color:#fff;\">Yacht Water<\u002Fstrong> and <strong style=\"color:#fff;\">Superline Wholesale<\u002Fstrong> — illustrate the through-line: when a brand activates inside Unfazed, the floor itself becomes the campaign. Product moves on-site, content compounds off-site, attendees become unpaid distribution.\n    <\u002Fp>\n\n    <!-- Confirmed partner: Nike (Quavo edition only) -->\n    <div style=\"margin-bottom:48px;background:#fff;color:var(--ink);border:3px solid var(--c4-green);display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:center;padding:28px 36px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--c4-red);font-weight:700;background:var(--c4-green);padding:6px 12px;align-self:start;border:2px solid var(--c4-black);white-space:nowrap;\">◆ CONFIRMED · QUAVO · AUG 29<\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:38px;line-height:1.05;letter-spacing:1px;color:var(--ink);margin-bottom:6px;\">NIKE IS A CONFIRMED PARTNER OF<br>THE <span style=\"color:var(--c4-red);\">QUAVO · AUG 29<\u002Fspan> EDITION.<\u002Fdiv>\n        <p style=\"font-size:14px;color:var(--muted);line-height:1.6;font-weight:400;max-width:680px;\">C4 would be joining a roster Nike has already signed onto for the Aug 29 Quavo edition — including a <strong style=\"color:var(--ink);\">Nike Studio Fleece design contest<\u002Fstrong> built around the night. Nike's participation underwrites the room — Headline Energy Partner slots C4 alongside, not behind, an anchor brand that doesn't activate at events lightly.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:54px;line-height:1;letter-spacing:2px;color:var(--ink);text-align:right;border-left:2px solid rgba(0,0,0,.15);padding-left:32px;\">NIKE<div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:6px;font-weight:600;\">Quavo · Aug 29<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cs-card\">\n      <div class=\"cs-card-hdr\">\n        <div class=\"cs-card-l\">\n          <div class=\"cs\">CASE STUDY 01<\u002Fdiv>\n          <div class=\"name\">YACHT<br>WATER<\u002Fdiv>\n          <div class=\"meta\">Beverage · 1 edition<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-card-body\">\n          <div class=\"th\">THE THESIS<\u002Fdiv>\n          <p>A challenger beverage brand tested Unfazed as a live-commerce + content vehicle. The objective: drive on-site sell-through, generate creator-led content at scale, and convert a one-night activation into weeks of organic reach.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-stats\">\n        <div class=\"cs-stat\">\n          <div class=\"big\">35<span class=\"sm\">/35<\u002Fspan><\u002Fdiv>\n          <div class=\"lbl\">Cases sold through<\u002Fdiv>\n          <div class=\"d\">Sold out of every case allocated to the activation in a single night.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-stat\">\n          <div class=\"big\">3.2<span class=\"sm\">×<\u002Fspan><\u002Fdiv>\n          <div class=\"lbl\">Monthly engagement lift<\u002Fdiv>\n          <div class=\"d\">Unfazed-produced content for Yacht Water more than tripled the brand's typical monthly IG engagement — from a single edition.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-stat\">\n          <div class=\"big\">100s<\u002Fdiv>\n          <div class=\"lbl\">Organic UGC posts<\u002Fdiv>\n          <div class=\"d\">Hundreds of attendee posts featured Yacht Water in-frame. Activation became a backdrop for personal content.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-card-foot\">\n        <div class=\"ins\">◆ THE INSIGHT FOR C4<\u002Fdiv>\n        <p><strong>Attendees don't just consume sponsor activations — they use them to make their own content.<\u002Fstrong> The Explosion Chamber becomes a co-author. For C4, that means the activation isn't an interruption to the night — it's the story the attendee tells the next morning, with a C4 can as the prop.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cs-card\">\n      <div class=\"cs-card-hdr\">\n        <div class=\"cs-card-l\" style=\"background:var(--c4-green);color:var(--c4-black);\">\n          <div class=\"cs\" style=\"color:rgba(0,0,0,.6);\">CASE STUDY 02<\u002Fdiv>\n          <div class=\"name\" style=\"color:var(--c4-black);\">SUPERLINE<br>WHOLESALE<\u002Fdiv>\n          <div class=\"meta\" style=\"color:rgba(0,0,0,.6);\">Apparel · 2 editions<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-card-body\">\n          <div class=\"th\">THE THESIS<\u002Fdiv>\n          <p>A wholesale apparel brand wanted to break out of its in-person video baseline and reach consumers outside its existing trade footprint. We placed Superline inside two editions and let the host-talent flywheel do the rest.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-stats\" style=\"grid-template-columns:repeat(4,1fr);\">\n        <div class=\"cs-stat\">\n          <div class=\"big\">4.3<span class=\"sm\">M<\u002Fspan><\u002Fdiv>\n          <div class=\"lbl\">Organic views, single asset<\u002Fdiv>\n          <div class=\"d\"><strong>Highest-viewed Superline video of 2025<\u002Fstrong> — 4.3M organic views, no paid amplification.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-stat\">\n          <div class=\"big\">+150<span class=\"sm\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"lbl\">Lift vs. in-person baseline<\u002Fdiv>\n          <div class=\"d\">Across both editions, Superline content outperformed the brand's standard in-person video benchmark by 150%+.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-stat\">\n          <div class=\"big\">3<span class=\"sm\"> NEW<\u002Fspan><\u002Fdiv>\n          <div class=\"lbl\">Top-tier brand clients sourced<\u002Fdiv>\n          <div class=\"d\">Activation produced <strong>3 inbound brand clients<\u002Fstrong> who today rank among Superline's largest accounts.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-stat\" style=\"border-right:none;\">\n          <div class=\"big\">2<span class=\"sm\">/2<\u002Fspan><\u002Fdiv>\n          <div class=\"lbl\">Editions, both over-indexed<\u002Fdiv>\n          <div class=\"d\">Two activations, both above benchmark — evidence the format compounds when a brand commits to a calendar. <strong>Exactly the structure of the C4 buy.<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-card-foot\">\n        <div class=\"ins\">◆ THE INSIGHT FOR C4<\u002Fdiv>\n        <p><strong>Host equity transfers — and so does business.<\u002Fstrong> When a brand integrates into a host-led night, it inherits a sliver of that host's distribution at a fraction of a direct-talent deal. For C4, that means partnering with Quavo without paying for a celebrity endorsement — and getting Atlanta to talk about C4 like C4 belongs in the cooler.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:48px;padding:36px 40px;background:var(--c4-red);color:#fff;display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center;border:3px solid var(--c4-green);\">\n      <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:120px;line-height:.85;letter-spacing:-2px;color:var(--c4-green);\">→<\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;color:rgba(255,255,255,.85);font-weight:700;\">What this means for C4<\u002Fdiv>\n        <div style=\"font-family:'Anton','Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1.05;margin-bottom:14px;\">A BEVERAGE BRAND SOLD OUT. AN APPAREL BRAND SET ITS YEAR-HIGH.<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:rgba(255,255,255,.95);\">Yacht Water and Superline didn't have category-defining products, a national footprint, or a Quavo headline takeover to ride. They still produced category-best results. Unfazed's playbook for C4 isn't a hypothesis — it's a repeatable system applied to a brand whose product already matches the moment. <strong style=\"background:var(--c4-green);color:var(--c4-black);padding:1px 6px;\">The ceiling for C4 is materially higher than what's documented above.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section class=\"cta\" id=\"cta\" style=\"border-bottom:none;\" data-screen-label=\"15 CTA\">\n  <div class=\"wrap\">\n    <div class=\"cta-grid\" style=\"grid-template-columns:1fr;\">\n      <div>\n        <div class=\"label\" style=\"color:rgba(255,255,255,.5);margin-bottom:24px;\">Next Step · Let's Talk<\u002Fdiv>\n        <h2>STAY <span class=\"g\">EXPLOSIVE,<\u002Fspan> <span class=\"r\">ATLANTA.<\u002Fspan><\u002Fh2>\n        <p>Quavo · Aug 29 is the cultural detonator of the FY26 calendar — with the next edition landing Oct 31. Lock the headline takeover and C4 owns the Atlanta summer — Explosion Chamber, content library, #FUELTHECREW, the works. We're ready when you are.<\u002Fp>\n        <div class=\"cta-actions\" style=\"max-width:680px;\">\n          <a href=\"mailto:partners@unfazedexhibit.com\" class=\"cta-act\">\n            <span class=\"k\">Email<\u002Fspan>\n            <span class=\"v\">partners@unfazedexhibit.com<\u002Fspan>\n            <span class=\"arr\">→<\u002Fspan>\n          <\u002Fa>\n          <a href=\"mailto:michael@unfazedexhibit.com\" class=\"cta-act\">\n            <span class=\"k\">Direct<\u002Fspan>\n            <span class=\"v\">michael@unfazedexhibit.com<\u002Fspan>\n            <span class=\"arr\">→<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://instagram.com/unfazedexhibit\" class=\"cta-act\">\n
